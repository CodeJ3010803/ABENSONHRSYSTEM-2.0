<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abenson HR - Login</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="login-container">
        <section class="login-hero">
            <div class="hero-content">
                <h1 class="brand-logo">abenson</h1>
                <h2>HR Management<br>System</h2>
                <p>Streamlining workforce excellence through modern HR technology and people-centric design.</p>
                <div class="hero-circles">
                    <div class="circle c1"></div>
                    <div class="circle c2"></div>
                </div>
            </div>
        </section>

        <section class="login-form-wrapper">
            <form id="login-form" class="login-form">
                <div class="form-header">
                    <h2>Welcome Back</h2>
                    <p>Enter your credentials to access the Abenson HR Portal.</p>
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="email" id="email" placeholder="name@abenson.com" required autocomplete="email">
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                        <button type="button" class="toggle-password" title="Toggle Password">👁️</button>
                    </div>
                </div>

                <div class="form-actions">
                    <label class="remember-me">
                        <input type="checkbox"> 
                        <span>Remember this device</span>
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn-submit">
                    Sign In to Portal
                </button>

                <p class="signup-link">
                    New to Abenson HR? <a href="register.html">Create an Account</a>
                </p>
            </form>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
